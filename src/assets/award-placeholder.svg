<svg width="640" height="360" viewBox="0 0 640 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B2B5BC"/>
      <stop offset="0.5" stop-color="#7E828A"/>
      <stop offset="1" stop-color="#1D2128"/>
    </linearGradient>
    <linearGradient id="overlay" x1="0" y1="130" x2="0" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="1" stop-color="#111319" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="blur" x="0" y="0" width="640" height="360" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
  </defs>

  <rect width="640" height="360" fill="url(#bg)"/>
  <g opacity="0.18" filter="url(#blur)">
    <circle cx="120" cy="62" r="88" fill="#fff"/>
    <circle cx="472" cy="110" r="104" fill="#fff"/>
  </g>

  <g transform="translate(342 22) rotate(14)">
    <rect x="0" y="0" width="182" height="312" rx="22" fill="#D8D9DC"/>
    <rect x="16" y="20" width="150" height="236" rx="14" fill="#C8CACF"/>
    <rect x="76" y="268" width="32" height="8" rx="4" fill="#A4A8AF"/>
    <rect x="36" y="44" width="112" height="8" rx="4" fill="#B9BCC2"/>
    <rect x="36" y="64" width="92" height="8" rx="4" fill="#B9BCC2"/>
  </g>

  <rect width="640" height="360" fill="url(#overlay)"/>
</svg>
