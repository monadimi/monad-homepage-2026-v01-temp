name: CI-CD

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  ci:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci

      - name: Validate JSON syntax
        run: npm run validate:json

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Upload CI build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ci-dist
          path: dist
          if-no-files-found: error
          retention-days: 7

  cd:
    name: Build delivery artifact (main)
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Upload delivery artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-dist
          path: dist
          if-no-files-found: error
          retention-days: 14
